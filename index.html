<!DOCTYPE html>
<html>

<head>
  <script src="./script.js" type="module"></script>

  <link rel="stylesheet" type="text/css" href="style.css" />

  <link rel="stylesheet" 
    href="https://fonts.googleapis.com/css?family=Noto Serif">
</head>

<title>Planet Shalom</title>

  <body 
  style="
    background-image: url(./images/wallpaper.gif); 
    background-size: cover; 
    height: 100vh;">

    <!--Top Bar-->
    <div 
    id="topbar"
    style="
      position: absolute;
      top: 3%; 
      left: 50%; 
      transform: translate(-50%, -50%);
      width: 100%; 
      display: flex; 
      backdrop-filter: blur(10px); 
      background-color: rgba(200, 249, 189, 0.5); 
      color: #D22405; 
      font-family: 'Noto Serif', serif; 
      justify-content: space-between; 
      gap: 32px">
      
      <p 
      id="welcomeopen"
      style="
        cursor: pointer;
        margin-left: 100px; 
        background-color: rgba(255, 255, 255, 0.5); 
        padding: 4px 12px; 
        border-radius: 16px;">
        Planet Shalom
      </p>

      <p 
      style="
        margin-left: 50px; 
        background-color: rgba(255, 255, 255, 0.5); 
        padding: 4px 12px; 
        border-radius: 16px;
        color: #CF244C">
        ⋆‧°𓏲ּ𝄢⋆‧°𓏲ּ𝄢⋆‧°𓏲ּ𝄢
      </p>

      <p 
      id="timeElement" 
      style="margin-right: 100px; 
        background-color:  rgba(255, 255, 255, 0.5); 
        padding: 4px 12px; 
        border-radius: 16px;">
        Time O'clock
      </p>
    </div>

    <!--Desktop Apps-->
    <div
    id="desktopApps"
    style="
      padding-top: 64px;
      padding-left: 16px;
      width: fit-content">

      <div
      style="
        text-align: center;
        padding: 16px;
        width: fit-content">
        
        <img 
        id="TheArchiveopen"
        src="./images/PlanetShalom.png"
        style="
          cursor: pointer;
          width: 50px; 
          height: auto;
          background-color: #F8E2E2;
          padding: 5px;
          border-radius: 10px;">

        <p
        style="
          margin: 0px;
          color: #FFFFFF;">
          The Archive
        </p>
      </div>
    </div>

    <!--The Planet Window-->
    <div
    class="window"
    id="TheArchive"
    style="
      display: none;">

      <div
      class="windowheader"
      id="TheArchiveheader"
      style="
        background-color:rgba(250, 200, 100, 0.25);
        backdrop-filter: blur(10px);
        padding: 8px;
        width: 100%;
        user-select: none;
        cursor: grab;
        display: flex;
        align-items: center;">

        <p
        style="
          color: #D22405;
          font-family: 'Noto Serif', serif;
          font-size: large;
          margin: 0px;
          margin-left: 45%">
           Archive
        </p>
       
        <div 
        class="closebutton"
        id="TheArchiveclose">
          Close
        </div>
      </div>

      <div
      style="
        display: flex;
        gap: 30px;
        width: 100%;
        align-items: center;
        padding: 20px;
        margin-left: 42px;
        background-color: rgba(255, 255, 255, 0.5);">

        <img
        src="./images/PlanetShalom.png"
        style="
            height: auto;
            width: 130px;  
            object-fit: cover;
            border-radius: 10px;"/>

        <div 
        style="
          text-align: left;">
            <h1
            style="
              color: #D60A46;
              font-family: 'Noto Serif', serif;
              font-size: xxx-large;
              margin: 0;">
              The Archive
            </h1>

          <p
          style="
            color: #D22405;
            font-family: 'Noto Serif', serif;
            font-size: large;
            margin-top: 10px;">
            aka, Shalom's Creative Portofolio :)
          <p>
        </div>
      </div>
    </div>
    
 
    <!--The Home Window-->
    <div
    class="window"
    id="welcome">
      <div
      class="windowheader"
      id="welcomeheader"
      style="
        background-color:rgba(250, 200, 100, 0.25);
        backdrop-filter: blur(10px);
        padding: 8px;
        width: 100%;
        user-select: none;
        cursor: grab;
        display: flex;
        align-items: center;">

        <p
        style="
          color: #D22405;
          font-family: 'Noto Serif', serif;
          font-size: large;
          margin: 0px;
          margin-left: 45%">
           Welcome
        </p>
       
        <div 
        class="closebutton"
        id="welcomeclose">
          Close
        </div>
      </div>

      <div
      style="
        display: flex;
        gap: 35px;
        align-items: center;
        padding: 20px;
        background-color: rgba(255, 255, 255, 0.5);">

        <img
        src="./images/shalom.png"
        style="
            height: 100px;
            width: 150px;  
            object-fit: cover;
            border-radius: 10px;"/>

        <div 
        style="
          text-align: left;">
            <h1
            style="
              color: #D60A46;
              font-family: 'Noto Serif', serif;
              font-size: xxx-large;
              margin: 0;">
              Planet Shalom
            </h1>

          <p
          style="
            color: #D22405;
            font-family: 'Noto Serif', serif;
            font-size: large;
            margin-top: 10px;">
            Greetings! Thanks for stopping by
          <p>
        </div>
      </div>
    </div>


  </body>
</html>
