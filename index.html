<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" 
    href="https://fonts.googleapis.com/css?family=Sansita Swashed">

  <link rel="stylesheet" 
    href="https://fonts.googleapis.com/css?family=Noto Serif">
</head>

  <title>ShalomOS</title>

  <body 
  style="
    background-image: url(./images/wallpaper.gif); 
    background-size: cover; 
    height: 100vh;">

    <script src="./script.js;"></script>

    <div 
    style="
      position: absolute;
      top: 3%; 
      left: 50%; 
      transform: translate(-50%, -50%);
      width: 100%; 
      display: flex; 
      backdrop-filter: blur(10px); 
      background-color: rgba(200, 249, 189, 0.5); 
      color: #CF244C; 
      font-family: 'Noto Serif', serif; 
      justify-content: space-between; 
      gap: 32px">
      
      <p 
      style="
        margin-left: 100px; 
        background-color: rgba(255, 255, 255, 0.25); 
        padding: 4px 12px; 
        border-radius: 16px;">
        Planet Shalom
      </p>

      <p 
      style="
        margin-left: 50px; 
        background-color: rgba(255, 255, 255, 0.25); 
        padding: 4px 12px; 
        border-radius: 16px;">
        ⋆‧°𓏲ּ𝄢⋆‧°𓏲ּ𝄢⋆‧°𓏲ּ𝄢
      </p>

      <p 
      id="timeElement" 
      style="margin-right: 100px; 
        background-color:  rgba(255, 255, 255, 0.25); 
        padding: 4px 12px; 
        border-radius: 16px;">
        Time O'clock
      </p>

    </div>
    
    <div
    style="
      border: none;
      border-radius: 10px;
      background-color: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px);
      width: 475px;
      padding: 20px;
      display: flex;
      position: absolute;
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%);
      align-items: center;
      gap: 35px;">

      <img
      src="./images/shalom.png"
      style="
        height: 100px;
        width: 150px;  
        object-fit: cover;
        border-radius: 10px;"/>

      <div style="text-align: left;">
        <h1
        style="
          color: #D60A46;
          font-family: 'Noto Serif', serif;
          font-size: xxx-large;
          margin: 0;">
          Planet Shalom
        </h1>

        <h4
        style="
          color: #d22405;
          font-family: 'Noto Serif', serif;
          font-size: large;
          margin-top: 10px;">
          Greetings! Thanks for stopping by
        </h4>
      </div>
    </div>
  </body>
</html>
